version: 2
number: 1
title: "Feature-Demo: Videos, Fragen & Vokabeln"
description: "Sieh dir an, wie Open Learn Video-Einbettungen, Frage-Antwort-Karten, Labels, verwandte Vokabeln und Markdown-Erklärungen darstellt — mit lustigen Tierfakten als Beispiele."

sections:
  - title: "Meeresbewohner"
    video: "https://www.youtube.com/watch?v=aqz-KE-bpKQ"
    explanation: |
      Der Ozean bedeckt **71 %** der Erdoberfläche, und weniger als 5 % davon sind erforscht.
      Hier sind einige unglaubliche Fakten über die Lebewesen dort unten.

      > **YAML-Tipp — Video:** Füge `video: "https://youtube.com/watch?v=..."` zu einer Section hinzu. Lokale Dateien gehen auch: `video: "video/sample.mp4"`.

      > **YAML-Tipp — Frage & Antwort:** Jedes Beispiel hat `q:` und `a:`. Füge `labels: [...]` für Tags und `rel:` für verwandte Begriffe hinzu.
    examples:
      - q: "Wie viele Herzen hat ein Oktopus?"
        a: "Drei — zwei pumpen Blut zu den Kiemen, eins pumpt es durch den restlichen Körper."
        labels: ["Anatomie"]
        rel:
          - ["Oktopus", "8 Arme, 3 Herzen, blaues Blut"]
          - ["Kopffüßer", "Klasse der Weichtiere, zu der Oktopus und Tintenfisch gehören"]

      - q: "Welches Tier überlebt es, komplett eingefroren zu werden?"
        a: "Der Waldfrosch — er kann überleben, wenn 65 % seines Körperwassers gefroren sind."
        labels: ["Überleben"]
        rel:
          - ["Waldfrosch", "Rana sylvatica, in Nordamerika heimisch"]
          - ["Kryoprotektivum", "natürliches Frostschutzmittel, das die Leber des Froschs produziert"]

      - q: "Wie lange kann ein Delfin wach bleiben?"
        a: "Unbegrenzt — Delfine schlafen immer nur mit einer Gehirnhälfte."
        labels: ["Schlaf", "Gehirn"]
        rel:
          - ["Unihemisphärischer Schlaf", "Schlafen mit nur einer Gehirnhälfte"]
          - ["Delfin", "hochintelligentes Meeressäugetier"]

      - q: "Welche Farbe hat das Blut eines Hummers?"
        a: "Durchsichtig — aber es wird blau, wenn es mit Sauerstoff in Kontakt kommt (es enthält Kupfer statt Eisen)."
        labels: ["Anatomie"]
        rel:
          - ["Hämocyanin", "kupferbasiertes Sauerstofftransportprotein"]
          - ["Hummer", "Krustentier mit kupferbasiertem Blut"]

  - title: "Insekten & winzige Kreaturen"
    explanation: |
      Insekten machen etwa **80 %** aller bekannten Tierarten aus.
      Manche ihrer Fähigkeiten stellen Science-Fiction in den Schatten.

      > **YAML-Tipp — Markdown:** Erklärungen unterstützen volles **Markdown**: fett, _kursiv_, Listen, Blockzitate und mehr.
    examples:
      - q: "Wie weit kann ein Floh im Verhältnis zu seiner Körpergröße springen?"
        a: "Ein Floh kann das 150-fache seiner eigenen Körperlänge springen — als würde ein Mensch über ein 75-stöckiges Gebäude springen."
        labels: ["Stärke"]
        rel:
          - ["Floh", "winziges parasitäres Insekt, unglaublicher Springer"]
          - ["Resilin", "elastisches Protein in Flohbeinen, das Sprünge ermöglicht"]

      - q: "Wie viele Linsen hat das Auge einer Libelle?"
        a: "Etwa 30.000 — das ergibt fast 360-Grad-Sicht."
        labels: ["Sehen"]
        rel:
          - ["Facettenauge", "Auge aus Tausenden einzelner Linsen"]
          - ["Libelle", "uraltes Insekt, seit 300 Millionen Jahren praktisch unverändert"]

      - q: "Kann eine Kakerlake ohne Kopf leben?"
        a: "Ja, etwa eine Woche lang — sie stirbt schließlich an Durst, weil sie nicht trinken kann."
        labels: ["Überleben"]
        rel:
          - ["Kakerlake", "eines der widerstandsfähigsten Insekten der Erde"]
          - ["Offenes Kreislaufsystem", "Blut nicht in Gefäßen eingeschlossen, ermöglicht kopfloses Überleben"]

      - q: "Welches ist das stärkste Tier im Verhältnis zu seiner Größe?"
        a: "Der Mistkäfer — er kann das 1.141-fache seines eigenen Körpergewichts ziehen."
        labels: ["Stärke"]
        rel:
          - ["Mistkäfer", "rollt Dungkugeln, unglaublich stark"]
          - ["Onthophagus taurus", "Hornmistkäfer-Art, stärkstes Tier"]

  - title: "Verrückte Säugetiere"
    explanation: |
      Selbst die Tiere, die wir gut zu kennen glauben, haben einige _echt seltsame_ versteckte Talente.
    examples:
      - q: "Wie lange braucht ein Faultier, um eine Mahlzeit zu verdauen?"
        a: "Bis zu 30 Tage — sie haben die langsamste Verdauung aller Säugetiere."
        labels: ["Verdauung"]
        rel:
          - ["Faultier", "langsamstes Säugetier, schläft 15–20 Stunden am Tag"]

      - q: "Wie nennt man eine Gruppe von Flamingos?"
        a: "Eine Flamboyance (engl. für Extravaganz)."
        labels: ["Sammelbegriffe"]
        rel:
          - ["Flamboyance", "englischer Sammelbegriff für Flamingos"]
          - ["Flamingo", "rosa durch Carotinoid-Pigmente in der Nahrung"]

      - q: "Können Kühe beste Freunde haben?"
        a: "Ja — Studien zeigen, dass Kühe beste Freunde haben und gestresst werden, wenn sie getrennt werden."
        labels: ["Verhalten"]
        rel:
          - ["Soziale Bindungen bei Kühen", "Kühe bilden enge Freundschaften in Herden"]

      - q: "Wie weit kann man ein Wolfsheulen hören?"
        a: "Bis zu 16 km (10 Meilen) im offenen Gelände."
        labels: ["Kommunikation"]
        rel:
          - ["Wolfsheulen", "dient der Fernkommunikation und Reviermarkierung"]
