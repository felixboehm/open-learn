version: 2
number: 2
title: "Feature-Demo: Quizze & Assessments"
description: "Probiere alle Assessment-Typen von Open Learn aus — Texteingabe, Einzelauswahl und Multiple Choice — mit Trivia-Fragen als Beispiele."

sections:
  - title: "Weltraum-Quiz"
    explanation: |
      Du denkst, du kennst das Universum? Finden wir es heraus.

      **So funktioniert's:** Tippe deine Antwort ein, wähle Checkboxen oder einen Radio-Button — dann klicke auf Absenden.
      Deine Antworten werden lokal gespeichert, damit du später zurückkommen kannst.

      > **YAML-Tipp — Texteingabe:** Nutze `type: input` mit `a:` als Liste akzeptierter Antworten (Groß-/Kleinschreibung beachten). Beispiel: `a: ["Saturn", "saturn"]`.

      > **YAML-Tipp — Einzelauswahl:** Nutze `type: select` mit `options:` und markiere eine Option mit `correct: true`.

      > **YAML-Tipp — Multiple Choice:** Nutze `type: multiple-choice` mit `options:` — mehrere Optionen können `correct: true` sein.
    examples:
      - type: input
        q: "Welcher Planet in unserem Sonnensystem hat die meisten Monde?"
        a:
          - "Saturn"
          - "saturn"
        labels: ["Weltraum"]

      - type: select
        q: "Wie lange braucht Sonnenlicht, um die Erde zu erreichen?"
        options:
          - text: "Etwa 8 Sekunden"
          - text: "Etwa 8 Minuten"
            correct: true
          - text: "Etwa 8 Stunden"
          - text: "Etwa 8 Tage"
        labels: ["Weltraum"]

      - type: multiple-choice
        q: "Welche davon sind echte Namen von Monden in unserem Sonnensystem?"
        options:
          - text: "Titan"
            correct: true
          - text: "Nexus"
          - text: "Europa"
            correct: true
          - text: "Ganymed"
            correct: true
        labels: ["Weltraum"]

      - q: "Ein Teelöffel eines Neutronensterns wiegt etwa 6 Milliarden Tonnen."
        a: "Das entspricht ungefähr dem Gewicht des Mount Everest — in einem Teelöffel."
        labels: ["Weltraum", "Unglaublich"]
        rel:
          - ["Neutronenstern", "kollabierter Kern eines massereichen Sterns"]

  - title: "Essen-Trivia"
    explanation: |
      Essensfakten, nach denen du deine Küche mit anderen Augen siehst.

      > **YAML-Tipp — Typen mischen:** Du kannst Frage-Antwort- und Assessment-Beispiele in derselben Section mischen. Beispiele ohne `type:` sind Standard-Q&A.
    examples:
      - type: input
        q: "Welche Frucht schwimmt im Wasser, weil sie zu 25 % aus Luft besteht?"
        a:
          - "Apfel"
          - "apfel"
          - "Äpfel"
          - "äpfel"
        labels: ["Essen"]

      - type: select
        q: "Was war das erste Essen, das im Weltraum gegessen wurde?"
        options:
          - text: "Ein Sandwich"
          - text: "Apfelmus aus einer Tube"
            correct: true
          - text: "Gefriergetrocknetes Eis"
          - text: "Eine Tortilla"
        labels: ["Essen", "Weltraum"]

      - type: multiple-choice
        q: "Welche dieser Lebensmittel sind botanisch gesehen Beeren?"
        options:
          - text: "Banane"
            correct: true
          - text: "Erdbeere"
          - text: "Avocado"
            correct: true
          - text: "Wassermelone"
            correct: true
        labels: ["Essen", "Biologie"]

      - q: "Honig wird nie schlecht. Archäologen fanden 3.000 Jahre alten Honig in ägyptischen Gräbern — noch essbar."
        a: "Der niedrige Feuchtigkeitsgehalt und der saure pH-Wert schaffen eine lebensfeindliche Umgebung für Bakterien."
        labels: ["Essen", "Geschichte"]
        rel:
          - ["Honigkonservierung", "natürliche antibakterielle Eigenschaften verhindern Verderb"]

  - title: "Zufälliger Unsinn"
    explanation: |
      Die verrücktesten Fakten, die in keine Kategorie passen. Viel Glück.

      > **YAML-Tipp — Labels:** Nutze `labels: ["Tag1", "Tag2"]` bei jedem Beispiel, um es zu kategorisieren. Nutzer können in der UI nach Labels filtern.
    examples:
      - type: input
        q: "In welchem Land ist es illegal, nur ein Meerschweinchen zu besitzen (weil sie einsam werden)?"
        a:
          - "Schweiz"
          - "schweiz"
        labels: ["Gesetze"]

      - type: select
        q: "Wie lautet der Fachbegriff für die Angst vor langen Wörtern?"
        options:
          - text: "Logophobie"
          - text: "Hippopotomonstrosesquippedaliophobie"
            correct: true
          - text: "Sesquipedalophobie"
          - text: "Verbophobie"
        labels: ["Sprache"]

      - type: multiple-choice
        q: "Welche davon sind echte Guinness-Weltrekorde?"
        options:
          - text: "Längste Zeit, einen Rasenmäher auf dem Kinn zu balancieren"
            correct: true
          - text: "Meiste T-Shirts gleichzeitig getragen (257)"
            correct: true
          - text: "Schnellster 100m-Sprint beim Stricken"
          - text: "Lautester Rülpser (109,9 dB)"
            correct: true
        labels: ["Rekorde"]

      - q: "Eine Gruppe von Möpsen heißt auf Englisch 'a grumble' (ein Grummeln)."
        a: "Ja, wirklich. A grumble of pugs."
        labels: ["Sammelbegriffe"]
        rel:
          - ["Grumble", "englischer Sammelbegriff für eine Gruppe Möpse"]
          - ["Mops", "kleine Hunderasse mit faltigem Gesicht"]
